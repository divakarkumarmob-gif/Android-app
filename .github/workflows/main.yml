name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build web app (creates dist/)
      - name: Build web app
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Copy dist → Android assets
      - name: Copy web assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/

      # Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Gradle setup
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ✅ FINAL BUILD (NO WRAPPER)
      - name: Build Debug APK
        working-directory: android-project/android
        run: |
          gradle assembleDebug --stacktrace

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dk-app-debug.apk
          path: android-project/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
