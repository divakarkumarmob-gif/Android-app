<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DK App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 2rem; }
    .icon {
      width: 80px; height: 80px;
      background: #6366F1;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: bold;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: #94A3B8; font-size: 0.9rem; margin-top: 1rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #6366F1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">DK</div>
    <h1>DK App</h1>
    <p>Smart Learning Platform</p>
    <div class="spinner"></div>
    <p style="margin-top:1rem; font-size:0.8rem;">
      ⚠️ Run <code style="color:#6366F1">npm run build</code> and copy<br>
      <code style="color:#6366F1">dist/*</code> to <code style="color:#6366F1">android/app/src/main/assets/public/</code>
    </p>
  </div>
</body>
</html>
